<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Note | Admin</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { margin-bottom: 10px; color: #333; }
        .file-name { color: #666; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        .form-input, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-textarea { resize: vertical; min-height: 100px; }
        .btn-save {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .btn-cancel {
            background: #ccc;
            color: #333;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            padding: 12px 24px;
            border-radius: 40px;
            margin-top: 15px;
            width: 100%;
        }
        .btn-cancel:hover { background: #bbb; }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>✏️ Edit Note</h1>
            <div class="file-name">File: {{ note.filename }}</div>
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Module Name</label>
                    {{ form.module }}
                </div>
                <div class="form-group">
                    <label>Course Name</label>
                    {{ form.course }}
                </div>
                <div class="form-group">
                    <label>Description</label>
                    {{ form.description }}
                </div>
                <button type="submit" class="btn-save">💾 Save Changes</button>
                <a href="/admin/" class="btn-cancel">← Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
