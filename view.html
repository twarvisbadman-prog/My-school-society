<!-- view.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View PDF | Twarvis School</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --primary: #3b82f6;
            --border: #334155;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --primary: #3b82f6;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav a {
            color: var(--text);
            text-decoration: none;
        }

        .nav a:hover {
            color: var(--primary);
        }

        .theme-toggle {
            background: var(--border);
            border: none;
            border-radius: 50px;
            padding: 8px;
            cursor: pointer;
        }

        .pdf-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            animation: fadeIn 0.5s ease;
        }

        .pdf-header {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .pdf-header h2 {
            margin-bottom: 8px;
        }

        .pdf-meta {
            color: var(--text-secondary);
            margin: 8px 0;
        }

        .pdf-viewer {
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        iframe {
            width: 100%;
            height: 80vh;
            border: none;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
        }
    </style>
    <script>
        function initTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        initTheme();
    </script>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <span class="logo">📚 Twarvis School</span>
            <div class="nav">
                <a href="/">Home</a>
                <a href="/browse/">Browse</a>
                <a href="/upload/">Upload</a>
                <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
            </div>
        </div>
    </div>

    <div class="pdf-container">
        <div class="pdf-header">
            <h2>{{ note.filename }}</h2>
            <div class="pdf-meta">
                <span>Module: {{ note.module }}</span> | 
                <span>Course: {{ note.course }}</span> |
                <span>Uploaded: {{ note.uploaded_at|slice:":10" }}</span>
            </div>
            <div>{{ note.description }}</div>
        </div>
        
        <div class="pdf-viewer">
            <iframe src="{{ pdf_url }}" title="PDF Viewer"></iframe>
        </div>
        
        <a href="/browse/" class="back-btn">← Back to Browse</a>
    </div>

    <div class="footer">
        <p>Twarvis School — Knowledge shared is knowledge multiplied</p>
    </div>
</body>
</html>
