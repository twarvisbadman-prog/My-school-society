<!-- upload.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Notes | Twarvis School</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border: #334155;
            --success: #10b981;
            --error: #ef4444;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-secondary: #475569;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav a {
            color: var(--text);
            text-decoration: none;
        }

        .nav a:hover {
            color: var(--primary);
        }

        .theme-toggle {
            background: var(--border);
            border: none;
            border-radius: 50px;
            padding: 8px;
            cursor: pointer;
        }

        .upload-card {
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 40px;
            margin: 60px 0;
            animation: fadeInUp 0.5s ease;
        }

        .upload-card h2 {
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-input, .form-textarea, .form-file {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            transition: border 0.2s;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-file {
            padding: 10px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .message.success {
            background: var(--success);
            color: white;
        }

        .message.error {
            background: var(--error);
            color: white;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
    </style>
    <script>
        function initTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        initTheme();
    </script>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <span class="logo">📚 Twarvis School</span>
            <div class="nav">
                <a href="/">Home</a>
                <a href="/browse/">Browse</a>
                <a href="/upload/">Upload</a>
                <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="upload-card">
            <h2>📤 Upload Notes or Past Paper</h2>
            
            {% if message %}
            <div class="message success">{{ message }}</div>
            {% endif %}
            {% if error %}
            <div class="message error">{{ error }}</div>
            {% endif %}

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    <label>{{ form.module.label }}</label>
                    {{ form.module }}
                </div>
                <div class="form-group">
                    <label>{{ form.course.label }}</label>
                    {{ form.course }}
                </div>
                <div class="form-group">
                    <label>{{ form.description.label }}</label>
                    {{ form.description }}
                </div>
                <div class="form-group">
                    <label>{{ form.file.label }}</label>
                    {{ form.file }}
                </div>
                <button type="submit" class="btn-submit">Upload File</button>
            </form>
        </div>
    </div>

    <div class="footer">
        <p>Share your knowledge — help fellow students succeed</p>
    </div>
</body>
</html>
